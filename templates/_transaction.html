<!-- Transaction History view partial -->
<div id="transactionView" class="view hidden">
    <section class="panel search-panel">
        <div class="panel-header">
            <h2>Transaction History Browse (NRI)</h2>
        </div>
        
        <!-- Search Criteria Section -->
        <div class="search-criteria" style="padding: 15px; background: #f5f5f5; border-radius: 4px; margin-bottom: 15px;">
            <div id="transactionSearchConditions"></div>
            
            <div style="margin-top: 10px; display: flex; gap: 10px;">
                <button id="transactionAddConditionBtn" class="btn secondary" style="padding: 8px 15px;">+ Add Condition</button>
                <button id="transactionSearchBtn" class="btn primary" style="padding: 8px 15px;">Search</button>
                <button id="transactionClearAllBtn" class="btn secondary" style="padding: 8px 15px;">Clear All</button>
            </div>
        </div>
        
        <div class="search-summary">
            <p id="transactionCount">Tìm thấy 0 kết quả</p>
        </div>
        
        <div class="table-wrapper" style="overflow-x: auto;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr id="transactionTableHeaders" style="background: #f0f0f0;">
                        <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">Index</th>
                    </tr>
                </thead>
                <tbody id="transactionTableBody">
                </tbody>
            </table>
        </div>
    </section>
</div>

<script>
// ===== CACHED DOM ELEMENTS =====
const transactionDOM = {
    addConditionBtn: null,
    searchBtn: null,
    clearBtn: null,
    conditionsDiv: null,
    thead: null,
    tbody: null,
    countEl: null,
};

// ===== DATA & CONFIGURATION =====
let transactionAllData = [];
let transactionConditionCount = 0;

const transactionSearchColumns = [
    'pt_part_type', 'pt_prod_line', 'pt_um', 'tr_curr', 'tr_date', 'tr_effdate',
    'tr_ex_rate', 'tr_ex_rate2', 'tr_line', 'tr_loc', 'tr_lot', 'tr_nbr',
    'tr_part', 'tr_price', 'tr_program', 'tr_qty_loc', 'tr_qty_req', 'tr_rmks',
    'tr_serial', 'tr_site', 'tr_status', 'tr_time', 'tr_trnbr', 'tr_type', 'tr_userid'
];

const transactionOperators = [
    { value: 'contains', label: 'contains' },
    { value: 'equals', label: 'equals' },
    { value: 'startsWith', label: 'starts with' }
];

// ===== INITIALIZATION =====
function initTransactionSearch() {
    console.log('Initializing transaction search...');
    
    // Cache DOM elements
    transactionDOM.addConditionBtn = document.getElementById('transactionAddConditionBtn');
    transactionDOM.searchBtn = document.getElementById('transactionSearchBtn');
    transactionDOM.clearBtn = document.getElementById('transactionClearAllBtn');
    transactionDOM.conditionsDiv = document.getElementById('transactionSearchConditions');
    transactionDOM.thead = document.getElementById('transactionTableHeaders');
    transactionDOM.tbody = document.getElementById('transactionTableBody');
    transactionDOM.countEl = document.getElementById('transactionCount');
    
    // Add event listeners
    if (transactionDOM.addConditionBtn) {
        transactionDOM.addConditionBtn.addEventListener('click', transactionAddCondition);
    }
    if (transactionDOM.searchBtn) {
        transactionDOM.searchBtn.addEventListener('click', transactionPerformSearch);
    }
    if (transactionDOM.clearBtn) {
        transactionDOM.clearBtn.addEventListener('click', transactionClearAllSearch);
    }
    
    transactionLoadData();
}

// ===== DATA LOADING =====
function transactionLoadData() {
    console.log('Loading transaction data...');
    fetch('/api/transaction')
        .then(response => {
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            return response.json();
        })
        .then(data => {
            transactionAllData = data || [];
            console.log(`Loaded ${transactionAllData.length} transaction records`);
            transactionDisplayData(transactionAllData);
            
            if (transactionConditionCount === 0) {
                transactionAddCondition();
            }
        })
        .catch(error => {
            console.error('Error loading transaction data:', error);
            if (transactionDOM.countEl) {
                transactionDOM.countEl.textContent = 'Lỗi khi tải dữ liệu';
            }
        });
}

// ===== ADD SEARCH CONDITION =====
function transactionAddCondition() {
    if (!transactionDOM.conditionsDiv) {
        console.error('Search conditions container not found');
        return;
    }
    
    const conditionId = transactionConditionCount++;
    const conditionDiv = document.createElement('div');
    conditionDiv.id = `transaction-condition-${conditionId}`;
    conditionDiv.className = 'transaction-condition';
    conditionDiv.style.cssText = 'display: flex; gap: 10px; margin-bottom: 10px; align-items: center;';
    
    // Column dropdown
    const columnSelect = document.createElement('select');
    columnSelect.className = 'transaction-search-column';
    columnSelect.style.cssText = 'padding: 6px; min-width: 150px;';
    
    const defaultOption = document.createElement('option');
    defaultOption.value = '';
    defaultOption.textContent = '-- Select Column --';
    columnSelect.appendChild(defaultOption);
    
    transactionSearchColumns.forEach(col => {
        const option = document.createElement('option');
        option.value = col;
        option.textContent = col;
        columnSelect.appendChild(option);
    });
    
    // Operator dropdown
    const operatorSelect = document.createElement('select');
    operatorSelect.className = 'transaction-search-operator';
    operatorSelect.style.cssText = 'padding: 6px; min-width: 100px;';
    operatorSelect.value = 'contains';
    
    transactionOperators.forEach(op => {
        const option = document.createElement('option');
        option.value = op.value;
        option.textContent = op.label;
        operatorSelect.appendChild(option);
    });
    
    // Value input
    const valueInput = document.createElement('input');
    valueInput.type = 'text';
    valueInput.className = 'transaction-search-value';
    valueInput.placeholder = 'Enter value...';
    valueInput.style.cssText = 'padding: 6px; min-width: 150px; flex: 1;';
    
    // Remove button
    const removeBtn = document.createElement('button');
    removeBtn.textContent = '−';
    removeBtn.className = 'transaction-remove-condition';
    removeBtn.style.cssText = 'padding: 6px 12px; background: #ff6b6b; color: white; border: none; border-radius: 4px; cursor: pointer;';
    removeBtn.addEventListener('click', function() {
        conditionDiv.remove();
    });
    
    // Append all elements
    conditionDiv.appendChild(columnSelect);
    conditionDiv.appendChild(operatorSelect);
    conditionDiv.appendChild(valueInput);
    conditionDiv.appendChild(removeBtn);
    
    transactionDOM.conditionsDiv.appendChild(conditionDiv);
}

// ===== PERFORM SEARCH =====
function transactionPerformSearch() {
    console.log('Performing search...');
    const conditions = transactionDOM.conditionsDiv.querySelectorAll('[id^="transaction-condition-"]');
    let filteredData = [...transactionAllData];
    
    console.log('Starting with', filteredData.length, 'total rows');
    
    conditions.forEach((conditionDiv, idx) => {
        const columnSelect = conditionDiv.querySelector('.transaction-search-column');
        const operatorSelect = conditionDiv.querySelector('.transaction-search-operator');
        const valueInput = conditionDiv.querySelector('.transaction-search-value');
        
        if (!columnSelect || !operatorSelect || !valueInput) return;
        
        const column = columnSelect.value;
        const operator = operatorSelect.value;
        const value = valueInput.value;
        
        if (!column || !value) return;
        
        const valueLower = value.toLowerCase();
        const countBefore = filteredData.length;
        
        filteredData = filteredData.filter(row => {
            const cellValue = String(row[column] || '').toLowerCase();
            
            switch(operator) {
                case 'equals':
                    return cellValue === valueLower;
                case 'contains':
                    return cellValue.includes(valueLower);
                case 'startsWith':
                    return cellValue.startsWith(valueLower);
                default:
                    return true;
            }
        });
        
        console.log(`Condition ${idx}: ${countBefore} → ${filteredData.length} rows`);
    });
    
    console.log('Final result:', filteredData.length, 'rows');
    transactionDisplayData(filteredData);
}

// ===== CLEAR ALL SEARCHES =====
function transactionClearAllSearch() {
    // Reset all input fields
    transactionDOM.conditionsDiv.querySelectorAll('.transaction-search-value').forEach(input => {
        input.value = '';
    });
    transactionDOM.conditionsDiv.querySelectorAll('.transaction-search-column').forEach(select => {
        select.value = '';
    });
    
    // Display all data
    transactionDisplayData(transactionAllData);
    if (transactionDOM.countEl) {
        transactionDOM.countEl.textContent = `Tìm thấy ${transactionAllData.length} kết quả`;
    }
}

// ===== DISPLAY TABLE DATA (OPTIMIZED) =====
function transactionDisplayData(data) {
    if (!transactionDOM.tbody || !transactionDOM.thead) {
        console.error('Table elements not found');
        return;
    }
    
    // Clear table body
    transactionDOM.tbody.innerHTML = '';
    
    if (!data || data.length === 0) {
        if (transactionDOM.countEl) transactionDOM.countEl.textContent = 'Tìm thấy 0 kết quả';
        return;
    }
    
    const columns = Object.keys(data[0]);
    
    // Set headers only once
    if (transactionDOM.thead.children.length === 1) {
        const headerFragment = document.createDocumentFragment();
        columns.forEach(col => {
            const th = document.createElement('th');
            th.textContent = col;
            th.style.cssText = 'padding: 10px; border: 1px solid #ddd; text-align: left; font-weight: bold; background: #f0f0f0;';
            headerFragment.appendChild(th);
        });
        transactionDOM.thead.appendChild(headerFragment);
    }
    
    // Batch DOM creation using DocumentFragment
    const fragment = document.createDocumentFragment();
    data.forEach((row, index) => {
        const tr = document.createElement('tr');
        tr.style.borderBottom = '1px solid #ddd';
        
        // Index column
        const indexTd = document.createElement('td');
        indexTd.textContent = index + 1;
        indexTd.style.cssText = 'padding: 10px; border: 1px solid #ddd;';
        tr.appendChild(indexTd);
        
        // Data columns
        columns.forEach(col => {
            const td = document.createElement('td');
            td.textContent = row[col] || '';
            td.style.cssText = 'padding: 10px; border: 1px solid #ddd;';
            tr.appendChild(td);
        });
        
        fragment.appendChild(tr);
    });
    
    // Add all rows at once
    transactionDOM.tbody.appendChild(fragment);
    
    // Update count
    if (transactionDOM.countEl) {
        transactionDOM.countEl.textContent = `Tìm thấy ${data.length} kết quả`;
    }
}

// ===== DOM READY INITIALIZATION =====
document.addEventListener('DOMContentLoaded', function() {
    console.log('DOM loaded, initializing transaction search');
    setTimeout(initTransactionSearch, 100);
});
</script>

<style>
.btn {
    border-radius: 4px;
    border: none;
    cursor: pointer;
    font-size: 0.9em;
    font-weight: 500;
    transition: all 0.2s;
}

.btn.primary {
    background: #0066cc;
    color: white;
}

.btn.primary:hover {
    background: #0052a3;
}

.btn.secondary {
    background: #e0e0e0;
    color: #333;
}

.btn.secondary:hover {
    background: #d0d0d0;
}
</style>
