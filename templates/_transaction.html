<!-- Transaction History view partial -->
<!-- JS logic is in static/js/transaction.js -->
<div id="transactionView" class="view hidden">
    <section class="panel search-panel">
        <div class="panel-header">
            <h2>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:.4rem"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
                Transaction History Browse (NRI)
            </h2>
        </div>

        <!-- Search condition builder -->
        <div class="search-criteria">
            <div id="transactionSearchConditions"></div>

            <div class="search-actions">
                <button id="transactionAddConditionBtn" class="btn secondary">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Thêm điều kiện
                </button>
                <button id="transactionSearchBtn" class="btn primary">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    Tìm kiếm
                </button>
                <button id="transactionClearAllBtn" class="btn secondary">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                    Xoá tất cả
                </button>
            </div>
        </div>

        <div class="search-summary">
            <p id="transactionCount">Nhập điều kiện tìm kiếm và click "Tìm kiếm"</p>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr id="transactionTableHeaders">
                        <th>Index</th>
                    </tr>
                </thead>
                <tbody id="transactionTableBody"></tbody>
            </table>
        </div>
    </section>
</div>
