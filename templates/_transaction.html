<!-- Transaction History view partial -->
<!-- JS logic is in static/js/transaction.js -->
<div id="transactionView" class="view hidden">
    <section class="panel search-panel">
        <div class="panel-header">
            <h2>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle;margin-right:.4rem"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>

            </h2>

        <div class="search-criteria">
            <div class="search-criteria-top">
                <div class="search-conditions-wrap">
                    <div id="transactionSearchConditions"></div>
                </div>

                    <button id="transactionSearchBtn" class="btn primary">Search</button>

        <div class="search-summary">
            <p id="transactionCount">Nhập điều kiện tìm kiếm và click "Tìm kiếm"</p>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr id="transactionTableHeaders">
                        <th>Index</th>
                    </tr>
                </thead>
                <tbody id="transactionTableBody"></tbody>
            </table>
        </div>
    </section>
</div>
