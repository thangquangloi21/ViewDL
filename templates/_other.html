<!-- Other views partial -->
<div id="otherView" class="view hidden">
    <section class="panel search-panel">
        <div class="panel-header">
            <h2 id="otherViewTitle">Chức năng khác</h2>
        </div>
        <div class="search-fields">
            <div class="field-group">
                <label for="otherSearchId">ID</label>
                <input type="text" id="otherSearchId" placeholder="Nhập ID" />
            </div>
            <div class="field-group">
                <label for="otherSearchName">Tên</label>
                <input type="text" id="otherSearchName" placeholder="Nhập tên" />
            </div>
            <div class="field-group">
                <label for="otherSearchStatus">Trạng thái</label>
                <input type="text" id="otherSearchStatus" placeholder="Nhập trạng thái" />
            </div>
            <button id="otherSearchBtn" class="btn primary">Tìm kiếm</button>
        </div>
        <div class="search-summary">
            <p id="otherCount">Tìm thấy 0 kết quả</p>
        </div>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr><th>ID</th><th>Tên</th><th>Trạng thái</th><th>Mô tả</th></tr>
                </thead>
                <tbody id="otherBody"></tbody>
            </table>
        </div>
    </section>
</div>

<!-- Template cho table row -->
<template id="tableRowTemplate">
    <tr>
        <td data-field="id"></td>
        <td data-field="name"></td>
        <td><span class="status-badge" data-field="status"></span></td>
        <td data-field="description"></td>
    </tr>
</template>
